name: Build and push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Extract GETTEXT_VERSION
        run: |
          VERSION=$(grep 'ARG GETTEXT_VERSION=' Dockerfile | cut -d= -f2)
          echo "GETTEXT_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          push: true
          platforms: ${{ matrix.platform }}
          build-args: GETTEXT_VERSION=${{ env.GETTEXT_VERSION }}
          outputs: type=image,name=sanchpet/envsubst,push-by-digest=true,name-canonical=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Extract GETTEXT_VERSION
        run: |
          VERSION=$(grep 'ARG GETTEXT_VERSION=' Dockerfile | cut -d= -f2)
          echo "GETTEXT_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create and push manifest
        run: |
          docker buildx imagetools create \
            --tag sanchpet/envsubst:latest \
            --tag sanchpet/envsubst:${{ env.GETTEXT_VERSION }} \
            $(printf 'sanchpet/envsubst@sha256:%s ' $(ls /tmp/digests))
