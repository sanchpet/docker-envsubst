name: Build and push to Docker Hub

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract GETTEXT_VERSION
        run: |
          VERSION=$(grep 'ARG GETTEXT_VERSION=' Dockerfile | cut -d= -f2)
          echo "GETTEXT_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: GETTEXT_VERSION=${{ env.GETTEXT_VERSION }}
          tags: |
            sanchpet/envsubst:latest
            sanchpet/envsubst:${{ env.GETTEXT_VERSION }}
